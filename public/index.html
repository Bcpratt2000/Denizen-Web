<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neighbour Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay" class="login-overlay hidden">
  <div class="login-card">
    <h1>🔒 Neighbour Map</h1>
    <p>Enter your password to access the map.</p>
    <form id="login-form">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Enter</button>
    </form>
    <p id="login-error" class="error hidden">Incorrect password. Try again.</p>
  </div>
</div>

<!-- Main App -->
<div id="app" class="app hidden">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">📍 Neighbour Map</h1>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <input type="text" id="search-input" class="search-input" placeholder="Search neighbours, pets, notes..." autocomplete="off">
        <div id="search-results" class="search-results hidden"></div>
      </div>
    </div>
    <div class="header-right">
      <button id="add-btn" class="btn btn-accent">+ Add Neighbour</button>
      <button id="logout-btn" class="btn btn-ghost" title="Logout">↩</button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div id="neighbour-list" class="neighbour-list">
        <!-- Populated by JS -->
      </div>
      <div id="list-empty" class="empty-state hidden">
        <p>No neighbours yet.</p>
        <p>Click <strong>+ Add Neighbour</strong> to get started.</p>
      </div>
    </aside>

    <!-- Map -->
    <main class="map-container">
      <div id="map" class="map"></div>
    </main>
  </div>

</div>

<!-- Detail Panel (slide-in) -->
<div id="detail-panel" class="detail-panel">
  <div class="detail-header">
    <h2 id="detail-address" class="detail-address"></h2>
    <div class="detail-actions">
      <button id="detail-edit-btn" class="btn btn-ghost">✎ Edit</button>
      <button id="detail-delete-btn" class="btn btn-ghost btn-danger">✕ Delete</button>
      <button id="detail-close-btn" class="btn btn-ghost">↩</button>
    </div>
  </div>
  <div id="detail-content" class="detail-content">
    <!-- Rendered markdown -->
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add Neighbour</h2>
      <button id="modal-close-btn" class="btn btn-ghost">✕</button>
    </div>
    <form id="neighbour-form" class="neighbour-form">
      <input type="hidden" id="form-id">
      
      <div class="form-group">
        <label for="form-address">Address *</label>
        <div class="input-with-action">
          <input type="text" id="form-address" required placeholder="e.g. 239 Portside Ave">
          <button type="button" id="pick-btn" class="btn btn-ghost" title="Pick location on map">📍 Pick on map</button>
          <button type="button" id="geocode-btn" class="btn btn-ghost" title="Look up address">🔍 Geocode</button>
        </div>
        <p id="geocode-status" class="form-hint"></p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Latitude</label>
          <input type="number" id="form-lat" step="any" placeholder="40.5437">
        </div>
        <div class="form-group">
          <label>Longitude</label>
          <input type="number" id="form-lng" step="any" placeholder="-111.7489">
        </div>
      </div>

      <div class="form-group">
        <label>Residents</label>
        <div id="residents-list" class="dynamic-list"></div>
        <button type="button" class="btn btn-ghost add-row-btn" data-target="residents">+ Add Resident</button>
      </div>

      <div class="form-group">
        <label>Pets</label>
        <div id="pets-list" class="dynamic-list"></div>
        <button type="button" class="btn btn-ghost add-row-btn" data-target="pets">+ Add Pet</button>
      </div>

      <div class="form-group">
        <label for="form-notes">Notes</label>
        <textarea id="form-notes" rows="4" placeholder="Any notes about this neighbour..."></textarea>
      </div>

      <div class="form-group">
        <label for="form-tags">Tags <span class="label-hint">(comma-separated)</span></label>
        <input type="text" id="form-tags" placeholder="e.g. dog, church-neighbour, kids">
      </div>

      <div class="form-actions">
        <button type="button" id="modal-cancel-btn" class="btn btn-ghost">Cancel</button>
        <button type="submit" class="btn btn-accent" id="form-submit-btn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-modal" class="modal-overlay hidden">
  <div class="modal modal-small">
    <h2>Delete Neighbour?</h2>
    <p>This will permanently delete <strong id="delete-address"></strong> and all their information.</p>
    <div class="form-actions">
      <button id="delete-cancel-btn" class="btn btn-ghost">Cancel</button>
      <button id="delete-confirm-btn" class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/api.js"></script>
<script src="/js/search.js"></script>
<script src="/js/map.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
